# Lilith Zero — Lethal Trifecta Protection for VS Code Copilot sidebar
#
# Automatically blocks the "read private → access untrusted → exfiltrate" pattern.
# protect_lethal_trifecta: true injects a rule that blocks any tool declared as
# EXFILTRATION class when BOTH ACCESS_PRIVATE and UNTRUSTED_SOURCE taints are active.
#
# Tool class assignments are explicit — Lilith performs no heuristic inference.
# Declare every tool that can exfiltrate data in tool_classes.

id: vscode-lethal-trifecta
customer_id: enterprise-demo
name: "VS Code Copilot — Lethal Trifecta Auto-Protection"
version: 1

protect_lethal_trifecta: true

# Explicit tool class assignments — no heuristics.
# #fetch is EXFILTRATION because it can send local file content to external URLs.
tool_classes:
  "#fetch": [EXFILTRATION]

static_rules:
  editFiles:          ALLOW
  createFile:         ALLOW
  readFile:           ALLOW
  searchFiles:        ALLOW
  listDirectory:      ALLOW
  deleteFile:         DENY
  runTerminalCommand: DENY
  "#fetch":           ALLOW   # blocked when both ACCESS_PRIVATE + UNTRUSTED_SOURCE taints are active
  pushToGitHub:       DENY

taint_rules:
  - tool: readFile
    action: ADD_TAINT
    tag: ACCESS_PRIVATE

  - tool: "#fetch"
    action: ADD_TAINT
    tag: UNTRUSTED_SOURCE

  # protect_lethal_trifecta auto-blocks #fetch (EXFILTRATION class, declared above)
  # when both ACCESS_PRIVATE + UNTRUSTED_SOURCE are simultaneously active.

resource_rules: []
