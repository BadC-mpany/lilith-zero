# Lilith Zero — VS Code Copilot Static Policy
# See TOOLS.md for the full tool name reference.
#
# Tool names are snake_case as sent by VS Code (e.g. read_file, not readFile).
# Both confirmed and documented variants are listed for robustness.
#
# Unrecognised tools → DENIED (fail-closed default).
# Add "LILITH_ZERO_DEBUG": "1" to hooks.json to discover new tool names.

id: vscode-static
customer_id: enterprise
name: "VS Code Copilot — Static Policy"
version: 1

static_rules:
  # ── READ-ONLY ──────────────────────────────────────────────────────────────
  read_file: ALLOW
  readFile: ALLOW           # camelCase alias (spec format)
  find_files: ALLOW
  file_search: ALLOW
  search: ALLOW
  grep_search: ALLOW
  semantic_search: ALLOW
  list_directory: ALLOW
  listDirectory: ALLOW
  get_errors: ALLOW
  get_diagnostics: ALLOW
  get_changed_files: ALLOW

  # ── FILE WRITES ────────────────────────────────────────────────────────────
  insert_edit_into_file: ALLOW
  editFiles: ALLOW          # camelCase alias
  edit_file: ALLOW
  create_file: ALLOW
  createFile: ALLOW         # camelCase alias
  create_directory: ALLOW

  # ── FILE DELETES (destructive — deny) ─────────────────────────────────────
  delete_file: DENY
  deleteFile: DENY

  # ── TERMINAL (deny — highest risk) ────────────────────────────────────────
  run_in_terminal: DENY
  runTerminalCommand: DENY  # camelCase alias
  run_vs_code_task: DENY

  # ── NETWORK ────────────────────────────────────────────────────────────────
  fetch_webpage: ALLOW
  fetch: ALLOW
  "#fetch": ALLOW

  # ── GIT / VERSION CONTROL (deny) ──────────────────────────────────────────
  run_git_command: DENY
  push_to_github: DENY
  pushToGitHub: DENY
  create_pull_request: DENY

  # ── BROWSER (experimental, deny by default) ───────────────────────────────
  browser_action: DENY

taint_rules: []
resource_rules: []
