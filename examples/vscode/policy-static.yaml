# Lilith Zero — Static Policy for VS Code Copilot sidebar agent mode
#
# ACTUAL tool names sent by VS Code (confirmed from hook logs — snake_case):
#   read_file             — read file contents
#   create_file           — create new file
#   insert_edit_into_file — edit/patch existing file
#   run_in_terminal       — run a terminal command
#   run_vs_code_task      — run a VS Code task
#   search                — text search in workspace
#   find_files            — find files by name/pattern
#   get_errors            — get linter/compiler errors
#   fetch                 — web fetch
#   #fetch                — alternative web fetch name
#
# NOTE: VS Code documentation says camelCase (readFile, editFiles) but the
# ACTUAL payload uses snake_case. Both are listed here for compatibility.
#
# Tools not listed → DENIED (fail-closed default).

id: vscode-static-demo
customer_id: enterprise-demo
name: "VS Code Copilot — Static Allow/Deny Policy"
version: 1

static_rules:
  # --- Read-only: always allow ---
  read_file: ALLOW          # confirmed from logs
  readFile: ALLOW           # camelCase alias (docs format)
  search: ALLOW
  find_files: ALLOW
  searchFiles: ALLOW
  list_directory: ALLOW
  listDirectory: ALLOW
  get_errors: ALLOW
  get_changed_files: ALLOW

  # --- File writes: allow ---
  create_file: ALLOW
  createFile: ALLOW
  insert_edit_into_file: ALLOW
  editFiles: ALLOW
  write_file: ALLOW

  # --- Terminal: DENY ---
  run_in_terminal: DENY
  runTerminalCommand: DENY
  run_vs_code_task: DENY

  # --- Destructive: DENY ---
  delete_file: DENY
  deleteFile: DENY

  # --- Network: allow (tainted in other policies) ---
  fetch: ALLOW
  "#fetch": ALLOW

  # --- Git/GitHub: DENY ---
  run_git_command: DENY
  push_to_github: DENY
  pushToGitHub: DENY
  create_pull_request: DENY

taint_rules: []
resource_rules: []
