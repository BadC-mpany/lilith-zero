id: "langchain-policy"
customerId: "demo-user"
name: "LangChain Integration Policy"
version: 1

staticRules:
  calculator: "ALLOW"
  database: "ALLOW"
  web_search: "ALLOW"
  list_files: "ALLOW"
  delete_record: "DENY"

taintRules:
  - tool: "database"
    action: "ADD_TAINT"
    tag: "SENSITIVE_CONTEXT"
  
  - tool: "web_search"
    action: "CHECK_TAINT"
    forbiddenTags: ["SENSITIVE_CONTEXT"]
    error: "Security Violation: Web search is prohibited after accessing the database to prevent data exfiltration."

  - tool: "list_files"
    action: "BLOCK"
    error: "Access denied. Node is not authorized to list files outside the project directory."
    pattern:
      not:
        tool_args_match:
          path: "/Users/mozer/Documents/projects/lilith-zero*"

resourceRules:
  - uriPattern: "file:///Users/mozer/Documents/projects/lilith-zero/*"
    action: "ALLOW"

protectLethalTrifecta: true
