# Lilith Zero — gh copilot CLI Static Policy
# See TOOLS.md for the full tool name reference.
#
# gh copilot CLI routes almost ALL operations through `bash`:
#   file writes, curl, git push, rm -rf — everything.
# Denying bash = safe read-only mode.
#
# Unrecognised tools → DENIED (fail-closed default).

id: gh-copilot-static
customer_id: enterprise
name: "gh copilot CLI — Static Policy"
version: 1

static_rules:
  # ── READ-ONLY: always allow ────────────────────────────────────────────────
  view:          ALLOW   # read file contents (confirmed)
  rg:            ALLOW   # ripgrep search (confirmed)
  glob:          ALLOW   # directory listing (confirmed)
  grep:          ALLOW   # text search (alternative to rg)
  report_intent: ALLOW   # informational only, no side effects (confirmed)
  think:         ALLOW   # internal reasoning, no external effect

  # ── SHELL: deny (blocks ALL destructive ops) ──────────────────────────────
  bash:          DENY    # ls, curl, git, file writes — everything (confirmed)
  powershell:    DENY    # Windows equivalent

  # ── FILE OPS (dedicated tools, rarely used — bash handles most) ───────────
  edit:          DENY
  create:        DENY
  apply_patch:   DENY

  # ── NETWORK ────────────────────────────────────────────────────────────────
  web_fetch:     DENY    # deny by default; ALLOW if web access is required

  # ── AGENT / TASK ───────────────────────────────────────────────────────────
  task:          DENY    # sub-agent delegation — deny unless explicitly needed
  ask_user:      ALLOW   # asking questions is safe

taint_rules: []
resource_rules: []
