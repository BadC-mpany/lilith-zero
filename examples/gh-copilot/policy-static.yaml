# Lilith Zero — Static Policy for gh copilot CLI
#
# This policy demonstrates static allow/deny rules.
# Every tool call goes through this before execution.
#
# Tools not listed → DENIED (fail-closed default).

id: gh-copilot-static-demo
customer_id: enterprise-demo
name: "gh copilot — Static Allow/Deny Policy"
version: 1

static_rules:
  # --- File Operations ---
  # Allow reading files (safe, no side effects)
  read_file: ALLOW
  readFile: ALLOW

  # Allow creating new files
  write_file: ALLOW
  writeFile: ALLOW

  # Allow editing existing files
  edit: ALLOW
  str_replace_editor: ALLOW
  str_replace_based_edit_tool: ALLOW

  # DENY deleting files — too destructive
  delete_file: DENY
  deleteFile: DENY

  # --- Shell / Terminal ---
  # DENY unrestricted shell execution
  shell: DENY
  bash: DENY
  run_terminal_command: DENY
  runTerminalCommand: DENY
  execute_command: DENY

  # Allow git read operations (status, log, diff)
  git_status: ALLOW
  git_log: ALLOW
  git_diff: ALLOW

  # DENY git destructive operations
  git_push: DENY
  git_reset: DENY
  git_force_push: DENY
  pushToGitHub: DENY

  # --- Search & Read ---
  search: ALLOW
  search_files: ALLOW
  searchFiles: ALLOW
  grep: ALLOW
  find: ALLOW
  list_directory: ALLOW

  # --- Network ---
  # DENY all network access by default
  fetch: DENY
  "#fetch": DENY
  web_search: DENY
  http_request: DENY
  curl: DENY
  wget: DENY

taint_rules: []
resource_rules: []
