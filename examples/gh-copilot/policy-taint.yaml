# Lilith Zero — Taint Tracking Policy for gh copilot CLI
#
# Demonstrates Information Flow Control (IFC) through taint tracking.
#
# Scenario: an agent reads a sensitive file (e.g. .env, credentials.json),
# acquiring a SENSITIVE_DATA taint. Any subsequent attempt to send data
# over the network (curl, fetch, etc.) is blocked — preventing exfiltration
# even if the agent was instructed to "share" the data.
#
# Taint state persists across multiple tool calls in the same session.
# Restarting gh copilot starts a fresh session (new cwd-derived session ID).

id: gh-copilot-taint-demo
customer_id: enterprise-demo
name: "gh copilot — Taint Tracking / IFC Policy"
version: 1

static_rules:
  # File reads: allowed, but some files add a taint (see taint_rules below)
  read_file: ALLOW
  readFile: ALLOW
  cat: ALLOW

  # File writes: allowed without taint requirements
  write_file: ALLOW
  writeFile: ALLOW
  edit: ALLOW
  str_replace_editor: ALLOW

  # Search: allowed
  search: ALLOW
  search_files: ALLOW
  searchFiles: ALLOW
  grep: ALLOW

  # Shell (limited): allowed for read-only operations
  shell: ALLOW
  bash: ALLOW
  run_terminal_command: ALLOW
  runTerminalCommand: ALLOW

  # Network: allowed ONLY if SENSITIVE_DATA taint is NOT active
  # (blocked via taint_rules below when taint is present)
  fetch: ALLOW
  "#fetch": ALLOW
  web_search: ALLOW
  curl: ALLOW
  wget: ALLOW
  http_request: ALLOW

taint_rules:
  # Reading sensitive files adds SENSITIVE_DATA taint
  - tool: read_file
    action: ADD_TAINT
    tag: SENSITIVE_DATA
    # Note: this fires for ALL read_file calls. In production you would
    # use resource_rules + path patterns to taint only specific files.

  - tool: readFile
    action: ADD_TAINT
    tag: SENSITIVE_DATA

  # Block network tools when SENSITIVE_DATA taint is active
  - tool: fetch
    action: CHECK_TAINT
    required_taints: ["SENSITIVE_DATA"]
    error: "BLOCKED: network access denied after reading sensitive file (exfiltration prevention)"

  - tool: "#fetch"
    action: CHECK_TAINT
    required_taints: ["SENSITIVE_DATA"]
    error: "BLOCKED: network access denied after reading sensitive file (exfiltration prevention)"

  - tool: curl
    action: CHECK_TAINT
    required_taints: ["SENSITIVE_DATA"]
    error: "BLOCKED: curl denied after reading sensitive file (exfiltration prevention)"

  - tool: wget
    action: CHECK_TAINT
    required_taints: ["SENSITIVE_DATA"]
    error: "BLOCKED: wget denied after reading sensitive file (exfiltration prevention)"

  - tool: web_search
    action: CHECK_TAINT
    required_taints: ["SENSITIVE_DATA"]
    error: "BLOCKED: web search denied after reading sensitive file (exfiltration prevention)"

  - tool: http_request
    action: CHECK_TAINT
    required_taints: ["SENSITIVE_DATA"]
    error: "BLOCKED: HTTP request denied after reading sensitive file (exfiltration prevention)"

resource_rules: []
