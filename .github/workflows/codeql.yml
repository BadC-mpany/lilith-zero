name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '20 4 * * 0' # Weekly scan

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
        # Note: CodeQL's Rust support requires experimental extractors not included
        # in standard setup. Use cargo-deny + cargo-audit for Rust vulnerability scanning.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    # Manual build step for Rust to ensure it builds correctly for CodeQL
    - name: Build Rust components (if Rust)
      if: matrix.language == 'rust'
      run: |
        cargo build --all-targets --no-default-features
      working-directory: lilith-zero

    - name: Autobuild
      if: matrix.language != 'rust'
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
