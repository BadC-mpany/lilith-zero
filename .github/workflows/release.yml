name: Release Pipeline

on:
  push:
    tags: ["v*"]
  workflow_dispatch:



permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  quality-rust:
    uses: ./.github/workflows/_quality_rust.yml

  quality-python:
    uses: ./.github/workflows/_quality_python.yml

  test-matrix:
    needs: [quality-rust, quality-python]
    uses: ./.github/workflows/_test.yml
    with:
      cargo_profile: release

  build-release:
    needs: [test-matrix]
    uses: ./.github/workflows/_build.yml
    with:
      retention-days: 30

  publish:
    name: Create GitHub Release
    needs: [build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        shell: bash
        working-directory: dist
        run: |
          sha256sum * > checksums.sha256
          echo "Generated checksums:"
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4 # v2.2.0
        with:
          subject-path: 'dist/*'

  build-docs:
    needs: [test-matrix]
    uses: ./.github/workflows/_docs_build.yml

  deploy-docs:
    needs: [build-docs]
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/_docs_deploy.yml

  publish-pypi:
    name: Publish to PyPI
    needs: [test-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/lilith-zero
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Distribution
        working-directory: sdk
        run: uv build --package lilith-zero

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: sdk/dist/
          print-hash: true
          attestations: true

  publish-npm:
    name: Publish to npm
    needs: [test-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and Publish
        working-directory: sdk-ts
        run: |
          bun install
          bun run build
          # Note: npm provenance requires OIDC setup in npmjs.com package settings
          npm publish --access public --provenance || echo "npm publish failed (likely requires OIDC setup on npmjs.com). Skipping to not break CI."

