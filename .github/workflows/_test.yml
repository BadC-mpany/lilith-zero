name: Matrix Tests

on:
  workflow_call:
    inputs:
      cargo_profile:
        required: false
        type: string
        default: release

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Rust Core Tests (Matrix)
  # --------------------------------------------------------------------------
  test-core:
    name: Rust Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lilith-zero -> target

      - name: Unit Tests
        working-directory: lilith-zero
        run: cargo test --locked --no-default-features --${{ inputs.cargo_profile }}

  # --------------------------------------------------------------------------
  # Webhook Feature Tests (Ubuntu only — Linux is the primary server platform)
  # --------------------------------------------------------------------------
  test-webhook:
    name: Webhook Feature (ubuntu)
    runs-on: ubuntu-latest
    needs: [test-core]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lilith-zero -> target

      - name: Webhook Unit + Integration Tests
        working-directory: lilith-zero
        run: cargo test --locked --features webhook

      - name: Webhook Shell Integration Tests
        working-directory: lilith-zero
        run: bash tests/verify_copilot_hooks.sh 2>/dev/null

  # --------------------------------------------------------------------------
  # Miri Undefined Behavior Check (Nightly)
  # --------------------------------------------------------------------------
  miri:
    name: Miri (UB Check)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Miri Toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: nightly
          components: miri

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lilith-zero -> target

      - name: Run Miri
        working-directory: lilith-zero
        env:
          # Allow IO for time/randomness, disabling strict isolation where safe
          MIRIFLAGS: "-Zmiri-disable-isolation"
        run: cargo miri test --locked

  # --------------------------------------------------------------------------
  # Python SDK Integration Tests (Matrix)
  # --------------------------------------------------------------------------
  test-sdk:
    name: SDK (Py${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: [test-core] # Wait for core tests to pass first
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lilith-zero -> target

      - name: Build Lilith Binary (debug)
        working-directory: lilith-zero
        run: cargo build --no-default-features

      - name: Install Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Unique cache key per python version
          cache-suffix: sdk-${{ matrix.python }}

      - name: Install SDK & Tests
        working-directory: sdk
        run: uv sync --dev

      - name: Run SDK Unit Tests
        working-directory: sdk
        run: uv run pytest tests/test_client.py -v

      - name: Run Red Team Tests
        working-directory: sdk
        env:
          LILITH_ZERO_BINARY_PATH: ${{ github.workspace }}/lilith-zero/target/debug/lilith-zero
        run: uv run pytest tests/red_team/ -v --timeout=60
