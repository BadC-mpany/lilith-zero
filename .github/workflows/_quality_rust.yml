name: Rust Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality-rust:
    name: Rust Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure git credentials for private deps
        run: |
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lilith-zero -> target

      - name: Format Check (Strict)
        run: cargo fmt --all -- --check
        working-directory: lilith-zero

      - name: Clippy (Strict)
        # Deny all warnings to ensure zero-tolerance policy
        run: cargo clippy --locked --all-targets --no-default-features -- -D warnings
        working-directory: lilith-zero

      - name: Clippy (Strict, webhook feature)
        # Separate check: webhook feature adds axum/tower code that must also be warning-free
        run: cargo clippy --locked --all-targets --features webhook -- -D warnings
        working-directory: lilith-zero

      - name: Dependency Scan (Deny)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          manifest-path: lilith-zero/Cargo.toml
