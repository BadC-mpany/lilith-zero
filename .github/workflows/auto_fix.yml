name: Auto Fix Quality
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-fix Quality Issues
    runs-on: ubuntu-latest
    # Avoid infinite loops when the bot pushes back to main
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore: auto-fix'))
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fix Python (Ruff)
        working-directory: sdk
        run: |
          uv pip install --system ruff
          # Fix linting and formatting
          ruff check src/lilith_zero tests --fix || true
          ruff format src/lilith_zero tests || true

      - name: Sync Python Lockfiles
        run: |
          uv lock || true
          if [ -d "sdk" ]; then cd sdk && uv lock || true; fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Fix Rust (Fmt)
        working-directory: lilith-zero
        run: cargo fmt --all || true

      - name: Sync Rust Lockfile
        working-directory: lilith-zero
        run: cargo check --no-default-features || true

      - name: Fix Rust (Clippy)
        working-directory: lilith-zero
        run: cargo clippy --all-targets --no-default-features --fix --allow-dirty --allow-staged -- -D warnings || true

      - name: Commit and Push Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix quality issues and sync lockfiles"
